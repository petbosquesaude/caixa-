<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Loja 3 — Pacotes</title>

<!-- PWA -->
<meta name="application-name" content="Loja 3 Pacotes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pacotes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#07080D">

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
:root{
  --bg:#07080D;
  --s1:#0E1018;
  --s2:#141620;
  --border:#222840;
  --border2:#2D3450;
  --gold:#F9C224;
  --goldd:#C4901A;
  --teal:#00E5B0;
  --rose:#FF2D55;
  --blue:#4DA6FF;
  --purple:#C48FFF;
  --green:#1DB954;
  --text:#EEF2FF;
  --muted:#5A6A8A;
  --muted2:#2E3A52;
  --title:'Bebas Neue',cursive;
  --body:'DM Sans',sans-serif;
  --mono:'DM Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:var(--body);color:var(--text);background:var(--bg);min-height:100vh;overflow-x:hidden}
.app{max-width:430px;margin:0 auto;min-height:100vh;padding-bottom:100px;position:relative;z-index:1}

/* Header */
.hdr{padding:24px 20px 0;display:flex;align-items:center;justify-content:space-between}
.hdr-brand{display:flex;align-items:center;gap:12px}
.hdr-paw{width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,var(--gold),var(--goldd));display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:0 0 28px rgba(249,194,36,.35)}
.hdr-title{font-family:var(--title);font-size:28px;background:linear-gradient(135deg,#fff 30%,var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr-sub{font-size:10px;color:var(--muted);margin-top:2px}
.bkp{padding:7px 12px;border-radius:20px;font-size:10px;font-family:var(--mono);font-weight:600;border:1.5px solid;cursor:pointer}
.bkp.ok{background:rgba(29,185,84,.15);border-color:rgba(29,185,84,.35);color:var(--green)}
.bkp.warn{background:rgba(249,194,36,.1);border-color:rgba(249,194,36,.4);color:var(--gold);animation:blink 2s infinite}
.bkp.bad{background:rgba(255,45,85,.15);border-color:rgba(255,45,85,.4);color:var(--rose)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.55}}

/* Alert Banner */
.alert-banner{background:linear-gradient(135deg,rgba(249,194,36,.12),rgba(249,194,36,.03));border:1px solid rgba(249,194,36,.4);border-radius:14px;margin:16px 16px 0;padding:12px 14px}
.alert-title{font-size:9px;text-transform:uppercase;letter-spacing:2px;color:var(--gold);font-weight:700;margin-bottom:8px}
.alert-item{display:flex;align-items:center;justify-content:space-between;padding:8px 0}
.alert-item:last-child{padding-bottom:0}
.alert-name{font-size:13px;font-weight:700;color:var(--gold)}
.alert-desc{font-size:9px;color:var(--muted);margin-top:2px}

/* Stats Row */
.stats-row{display:flex;gap:8px;margin:16px 16px 0}
.stat-card{flex:1;background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:12px;text-align:center}
.stat-val{font-size:20px;font-weight:700;font-family:var(--mono)}
.stat-label{font-size:8px;text-transform:uppercase;color:var(--muted);margin-top:4px;letter-spacing:.5px}
.stat-card.green .stat-val{color:var(--green)}
.stat-card.rose .stat-val{color:var(--rose)}
.stat-card.gold .stat-val{color:var(--gold)}
.stat-card.blue .stat-val{color:var(--blue)}

/* Search */
.search-wrap{margin:16px 16px 8px}
.search-input{width:100%;background:var(--s1);border:1.5px solid var(--border);border-radius:14px;padding:14px 16px;color:var(--text);font-family:var(--body);font-size:14px;outline:none}
.search-input:focus{border-color:var(--gold)}

/* Client List */
.sec{margin:16px 16px 8px;font-size:9px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);display:flex;align-items:center;gap:8px}
.sec::after{content:'';flex:1;height:1px;background:var(--border2)}

.client-card{background:var(--s1);border:1.5px solid var(--border);border-radius:14px;margin:8px 16px;padding:16px;transition:all .15s}
.client-card.vencido{border-color:var(--rose);background:rgba(255,45,85,.05)}
.client-card.ultimo{border-color:var(--gold);background:rgba(249,194,36,.05)}
.client-header{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.client-avatar{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,var(--purple),var(--blue));display:flex;align-items:center;justify-content:center;font-size:22px}
.client-info{flex:1}
.client-name{font-size:15px;font-weight:700}
.client-pet{font-size:11px;color:var(--muted);margin-top:2px}
.client-badge{padding:4px 8px;border-radius:8px;font-size:9px;font-weight:700;background:rgba(90,106,138,.15)}
.client-badge.semanal{background:rgba(77,166,255,.15);color:var(--blue)}
.client-badge.quinzenal{background:rgba(0,229,176,.15);color:var(--teal)}
.client-badge.mensal{background:rgba(249,194,36,.15);color:var(--gold)}
.progress-wrap{margin:10px 0}
.progress-bar{height:6px;background:var(--muted2);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width .3s}
.progress-fill.green{background:var(--green)}
.progress-fill.gold{background:var(--gold)}
.progress-fill.rose{background:var(--rose)}
.progress-text{font-size:10px;color:var(--muted);margin-top:4px}
.client-dates{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin:8px 0}
.client-buttons{display:flex;gap:8px;margin-top:12px}
.btn-checkin{flex:1;padding:12px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--green),#138A40);color:#000;font-weight:700;font-size:13px;cursor:pointer}
.btn-history{flex:1;padding:12px;border-radius:10px;border:1.5px solid var(--border2);background:transparent;color:var(--text);font-size:13px;cursor:pointer}
.btn-renew{flex:1;padding:12px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--gold),var(--goldd));color:#000;font-weight:700;font-size:13px;cursor:pointer}
.btn-checkin:active,.btn-history:active,.btn-renew:active{transform:scale(.96)}

/* Empty state */
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-icon{font-size:48px;opacity:.3;margin-bottom:12px}

/* Bottom Bar */
.bottom-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;display:flex;gap:8px;padding:12px 16px 28px;background:linear-gradient(to top,var(--bg) 70%,transparent);z-index:50}
.bottom-btn{flex:1;padding:14px;border-radius:12px;border:none;font-weight:700;font-size:12px;cursor:pointer;transition:all .15s}
.bottom-btn:active{transform:scale(.96)}
.btn-new{background:linear-gradient(135deg,var(--purple),#7B4ECC);color:#fff}
.btn-report{background:rgba(0,229,176,.1);border:1.5px solid rgba(0,229,176,.3);color:var(--teal)}
.btn-alerts{background:rgba(249,194,36,.1);border:1.5px solid rgba(249,194,36,.3);color:var(--gold)}

/* Modal */
.modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.modal.show{display:flex}
.modal-content{background:var(--s1);border:1px solid var(--border);border-radius:20px;width:100%;max-width:380px;max-height:85vh;overflow-y:auto}
.modal-header{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.modal-title{font-size:16px;font-weight:700}
.modal-close{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer}
.modal-body{padding:20px}
.modal-footer{padding:16px 20px;border-top:1px solid var(--border);display:flex;gap:10px}

/* Form */
.form-group{margin-bottom:16px}
.form-label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-weight:700;margin-bottom:6px;display:block}
.form-input,.form-select{width:100%;background:var(--bg);border:1.5px solid var(--border2);border-radius:10px;padding:12px 14px;color:var(--text);font-family:var(--body);font-size:14px;outline:none}
.form-input:focus,.form-select:focus{border-color:var(--gold)}
.form-row{display:flex;gap:10px}
.form-row .form-group{flex:1}

/* Dias da semana */
.dias-wrap{display:flex;gap:8px;flex-wrap:wrap}
.dia-btn{padding:10px 14px;border-radius:10px;border:1.5px solid var(--border2);background:var(--s1);color:var(--muted);cursor:pointer;font-size:12px;font-weight:600}
.dia-btn.selected{border-color:var(--gold);background:rgba(249,194,36,.15);color:var(--gold)}

/* History items */
.history-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border2)}
.history-date{font-family:var(--mono);font-size:12px}
.history-rest{font-size:11px;color:var(--muted)}

/* Toast */
.toast{position:fixed;top:22px;left:50%;z-index:999;transform:translateX(-50%) translateY(-90px);padding:11px 20px;border-radius:24px;font-size:13px;font-weight:700;border:1px solid;transition:transform .3s;backdrop-filter:blur(12px);white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.ok{background:rgba(29,185,84,.15);border-color:rgba(29,185,84,.4);color:var(--green)}
.toast.err{background:rgba(255,45,85,.15);border-color:rgba(255,45,85,.4);color:var(--rose)}
.toast.warn{background:rgba(249,194,36,.12);border-color:rgba(249,194,36,.4);color:var(--gold)}
</style>
</head>
<body>
<div class="app">

<div class="hdr">
  <div class="hdr-brand">
    <div class="hdr-paw">🐾</div>
    <div>
      <div class="hdr-title">PACOTES</div>
      <div class="hdr-sub">controle de clientes</div>
    </div>
  </div>
  <div class="bkp ok" id="bkpBadge" onclick="syncNow()">💾 sinc</div>
</div>

<!-- Alert Banner -->
<div id="alertBanner" style="display:none">
  <div class="alert-banner">
    <div class="alert-title">⚠️ PRECISAM DE ATENÇÃO</div>
    <div id="alertList"></div>
  </div>
</div>

<!-- Stats -->
<div class="stats-row">
  <div class="stat-card green"><div class="stat-val" id="statAtivos">0</div><div class="stat-label">ATIVOS</div></div>
  <div class="stat-card blue"><div class="stat-val" id="statUsos">0</div><div class="stat-label">USOS/MÊS</div></div>
  <div class="stat-card gold"><div class="stat-val" id="statUltimo">0</div><div class="stat-label">ÚLTIMO BANHO</div></div>
  <div class="stat-card rose"><div class="stat-val" id="statVencidos">0</div><div class="stat-label">VENCIDOS</div></div>
</div>

<!-- Search -->
<div class="search-wrap">
  <input type="text" class="search-input" id="searchInput" placeholder="🔎 Buscar cliente ou pet..." autocomplete="off">
</div>

<div class="sec">🐕 CLIENTES COM PACOTE</div>
<div id="clientList"></div>

<!-- Bottom Bar -->
<div class="bottom-bar">
  <button class="bottom-btn btn-new" id="btnNewPacote">➕ NOVO</button>
  <button class="bottom-btn btn-report" id="btnRelatorio">📊 RELATÓRIO</button>
  <button class="bottom-btn btn-alerts" id="btnAlertas">🔔 ALERTAS</button>
</div>

</div>

<div class="toast" id="toast"></div>

<!-- Modal Novo Pacote -->
<div id="newModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <span class="modal-title">📝 NOVO PACOTE</span>
      <button class="modal-close" id="closeNewModalBtn">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group"><label class="form-label">NOME DO TUTOR *</label><input type="text" id="newNome" class="form-input" placeholder="Ex: João Silva"></div>
      <div class="form-group"><label class="form-label">NOME DO PET</label><input type="text" id="newPet" class="form-input" placeholder="Ex: Rex"></div>
      <div class="form-group"><label class="form-label">TELEFONE</label><input type="tel" id="newTelefone" class="form-input" placeholder="(11) 99999-9999"></div>
      
      <div class="form-row">
        <div class="form-group"><label class="form-label">📅 DATA PAGAMENTO *</label><input type="date" id="newDataPagamento" class="form-input"></div>
        <div class="form-group"><label class="form-label">💰 VALOR (R$)</label><input type="number" id="newValor" class="form-input" placeholder="120,00" step="10"></div>
      </div>
      
      <div class="form-group"><label class="form-label">🔄 FREQUÊNCIA</label>
        <select id="newFrequencia" class="form-select">
          <option value="semanal">Semanal (vem 1x por semana)</option>
          <option value="quinzenal">Quinzenal (vem a cada 15 dias)</option>
          <option value="mensal">Mensal (vem 1x por mês)</option>
        </select>
      </div>
      
      <div class="form-group" id="diaSemanaGroup" style="display:none">
        <label class="form-label">📆 DIA DA SEMANA PREFERIDO</label>
        <div class="dias-wrap" id="diasSemana">
          <div class="dia-btn" data-dia="segunda">SEG</div>
          <div class="dia-btn" data-dia="terca">TER</div>
          <div class="dia-btn" data-dia="quarta">QUA</div>
          <div class="dia-btn" data-dia="quinta">QUI</div>
          <div class="dia-btn" data-dia="sexta">SEX</div>
          <div class="dia-btn" data-dia="sabado">SÁB</div>
        </div>
      </div>
      
      <div class="form-group" id="diaMesGroup" style="display:none">
        <label class="form-label">📆 DIA DO MÊS (1-31)</label>
        <input type="number" id="newDiaMes" class="form-input" placeholder="Ex: 15" min="1" max="31">
      </div>
      
      <div class="form-group"><label class="form-label">📝 OBSERVAÇÃO</label><input type="text" id="newObs" class="form-input" placeholder="Raça, alergias, etc."></div>
    </div>
    <div class="modal-footer">
      <button class="bottom-btn" id="btnSalvarPacote" style="flex:1;background:linear-gradient(135deg,var(--green),#138A40);color:#000;border:none">💾 SALVAR</button>
      <button class="bottom-btn" id="btnCancelarPacote" style="flex:1;background:transparent;border:1.5px solid var(--border2)">CANCELAR</button>
    </div>
  </div>
</div>

<!-- Modal Histórico -->
<div id="historyModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <span class="modal-title" id="historyTitle">📜 HISTÓRICO</span>
      <button class="modal-close" id="closeHistoryModalBtn">✕</button>
    </div>
    <div class="modal-body" id="historyBody"></div>
    <div class="modal-footer">
      <button class="bottom-btn btn-report" id="btnExportarHistorico" style="flex:1">📤 EXPORTAR</button>
      <button class="bottom-btn" id="btnFecharHistorico" style="flex:1;background:transparent;border:1.5px solid var(--border2)">FECHAR</button>
    </div>
  </div>
</div>

<!-- Modal Alertas -->
<div id="alertsModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <span class="modal-title">🔔 CENTRAL DE ALERTAS</span>
      <button class="modal-close" id="closeAlertsModalBtn">✕</button>
    </div>
    <div class="modal-body" id="alertsBody"></div>
    <div class="modal-footer">
      <button class="bottom-btn btn-new" id="btnFecharAlertasModal" style="flex:1">FECHAR</button>
    </div>
  </div>
</div>

<script>
// Supabase config
const SUPA_URL = "https://wyibsreqdvnllzuzjvgr.supabase.co";
const SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind5aWJzcmVxZHZubGx6dXpqdmdyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1NTc5MzEsImV4cCI6MjA5MjEzMzkzMX0.AbK_8f8NKvwHbDgvDJthibFKrUW8fFJmR2YGnjq7ovs";
const supabaseClient = supabase.createClient(SUPA_URL, SUPA_KEY);

let clientes = [];
let historico = [];
let currentHistoryId = null;
let selectedDiaSemana = 'sexta';

function toast(msg, type = 'ok') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast ' + type + ' show';
  setTimeout(() => el.classList.remove('show'), 2500);
}

function formatarData(data) {
  if (!data) return '—';
  const d = new Date(data);
  return `${d.getDate().toString().padStart(2, '0')}/${(d.getMonth() + 1).toString().padStart(2, '0')}/${d.getFullYear()}`;
}

// ============================================
// CARREGAR DADOS
// ============================================
async function carregarDados() {
  try {
    const { data: clientesData, error: clientesError } = await supabaseClient
      .from('app_pacotes_clientes')
      .select('*')
      .order('cliente_nome');
    
    if (clientesError) throw clientesError;
    clientes = clientesData || [];

    const { data: historicoData, error: historicoError } = await supabaseClient
      .from('app_pacotes_historico')
      .select('*')
      .order('data_evento', { ascending: false });
    
    if (!historicoError) historico = historicoData || [];

    renderClientes();
    atualizarStats();
    atualizarAlertas();
    atualizarBadge();
    
    if (clientes.length) {
      toast(`✅ ${clientes.length} clientes carregados`, 'ok');
    }
  } catch (e) {
    console.error(e);
    toast('Erro ao carregar dados', 'err');
    document.getElementById('clientList').innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><p>Erro de conexão</p></div>`;
  }
}

// ============================================
// REGISTRAR PRESENÇA (SÓ ISSO VAI PARA O HISTÓRICO)
// ============================================
async function registrarPresenca(id) {
  const cliente = clientes.find(c => c.id === id);
  if (!cliente) return;
  
  const hoje = new Date().toISOString().slice(0, 10);
  const novosUsos = (cliente.usos_realizados || 0) + 1;
  const totalBanhos = cliente.total_banhos || 4;
  const usosRestantes = totalBanhos - novosUsos;
  
  try {
    await supabaseClient
      .from('app_pacotes_clientes')
      .update({
        usos_realizados: novosUsos,
        ultimo_uso: hoje,
        status: usosRestantes <= 0 ? 'vencido' : 'ativo',
        updated_at: new Date().toISOString()
      })
      .eq('id', id);
    
    // Só registra PRESENÇA no histórico
    await supabaseClient
      .from('app_pacotes_historico')
      .insert({
        cliente_id: id,
        cliente_nome: cliente.cliente_nome,
        pet_nome: cliente.pet_nome,
        data_evento: hoje,
        tipo_evento: 'presenca',
        usos_restantes: usosRestantes
      });
    
    toast(`✅ ${cliente.pet_nome || cliente.cliente_nome} - banho registrado!`, 'ok');
    carregarDados();
  } catch (e) {
    console.error(e);
    toast('Erro ao registrar', 'err');
  }
}

// ============================================
// RENOVAR PACOTE
// ============================================
async function renovarPacote(id) {
  const cliente = clientes.find(c => c.id === id);
  if (!cliente) return;
  
  const hoje = new Date().toISOString().slice(0, 10);
  const totalBanhos = cliente.tipo_frequencia === 'semanal' ? 4 : (cliente.tipo_frequencia === 'quinzenal' ? 2 : 4);
  
  try {
    await supabaseClient
      .from('app_pacotes_clientes')
      .update({
        usos_realizados: 0,
        status: 'ativo',
        data_pagamento: hoje,
        updated_at: new Date().toISOString()
      })
      .eq('id', id);
    
    // Registrar renovação no histórico
    await supabaseClient
      .from('app_pacotes_historico')
      .insert({
        cliente_id: id,
        cliente_nome: cliente.cliente_nome,
        pet_nome: cliente.pet_nome,
        data_evento: hoje,
        tipo_evento: 'renovacao',
        observacao: `Renovado - R$ ${cliente.valor_pago || 0}`
      });
    
    toast(`💰 ${cliente.pet_nome || cliente.cliente_nome} - pacote renovado!`, 'ok');
    carregarDados();
  } catch (e) {
    console.error(e);
    toast('Erro ao renovar', 'err');
  }
}

// ============================================
// VER HISTÓRICO (SÓ PRESENÇAS)
// ============================================
async function verHistorico(id) {
  currentHistoryId = id;
  const cliente = clientes.find(c => c.id === id);
  const hist = historico.filter(h => h.cliente_id === id && h.tipo_evento === 'presenca');
  
  document.getElementById('historyTitle').innerHTML = `📜 ${cliente.pet_nome || cliente.cliente_nome}`;
  
  if (!hist.length) {
    document.getElementById('historyBody').innerHTML = '<div class="empty"><div class="empty-icon">📭</div><p>Nenhuma presença registrada ainda</p></div>';
  } else {
    document.getElementById('historyBody').innerHTML = `
      <div style="margin-bottom:16px;padding:12px;background:rgba(90,106,138,.08);border-radius:12px">
        <div><strong>${escapeHtml(cliente.cliente_nome)}</strong> · ${cliente.pet_nome ? escapeHtml(cliente.pet_nome) : ''}</div>
        <div style="font-size:12px;color:var(--muted);margin-top:4px">📞 ${cliente.telefone || '—'} | 📦 ${cliente.tipo_frequencia}</div>
      </div>
      <div style="font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:12px">🔽 HISTÓRICO DE PRESENÇAS</div>
      ${hist.map(h => `
        <div class="history-item">
          <span class="history-date">✅ ${formatarData(h.data_evento)}</span>
          <span class="history-rest">${h.usos_restantes > 0 ? `restavam ${h.usos_restantes} banhos` : 'ÚLTIMO BANHO!'}</span>
        </div>
      `).join('')}
    `;
  }
  
  document.getElementById('historyModal').classList.add('show');
}

// ============================================
// RENDERIZAR LISTA
// ============================================
function escapeHtml(text) {
  if (!text) return '';
  return text.replace(/[&<>]/g, function(m) {
    if (m === '&') return '&amp;';
    if (m === '<') return '&lt;';
    if (m === '>') return '&gt;';
    return m;
  });
}

function renderClientes() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const filtrados = clientes.filter(c => 
    c.cliente_nome.toLowerCase().includes(search) || 
    (c.pet_nome && c.pet_nome.toLowerCase().includes(search))
  );
  
  const container = document.getElementById('clientList');
  if (!filtrados.length) {
    container.innerHTML = `<div class="empty"><div class="empty-icon">🐕</div><p>Nenhum cliente encontrado</p></div>`;
    return;
  }
  
  container.innerHTML = filtrados.map(c => {
    const usosRealizados = c.usos_realizados || 0;
    const totalBanhos = c.total_banhos || 4;
    const percent = (usosRealizados / totalBanhos) * 100;
    const vencido = usosRealizados >= totalBanhos;
    const isUltimo = (totalBanhos - usosRealizados) === 1 && !vencido;
    
    const badgeClass = c.tipo_frequencia;
    const badgeText = c.tipo_frequencia === 'semanal' ? '📅 Semanal' : (c.tipo_frequencia === 'quinzenal' ? '📅 Quinzenal' : '📅 Mensal');
    
    let statusText = '';
    let statusCor = '';
    if (vencido) {
      statusText = '🔴 PACOTE VENCIDO';
      statusCor = 'rose';
    } else if (isUltimo) {
      statusText = '🟡 ÚLTIMO BANHO! Renove esta semana';
      statusCor = 'gold';
    } else {
      statusText = `🟢 ${totalBanhos - usosRealizados} banhos restantes`;
      statusCor = 'green';
    }
    
    const cardClass = vencido ? 'vencido' : (isUltimo ? 'ultimo' : '');
    const fillCor = vencido ? 'rose' : (isUltimo ? 'gold' : 'green');
    
    return `
      <div class="client-card ${cardClass}">
        <div class="client-header">
          <div class="client-avatar">🐕</div>
          <div class="client-info">
            <div class="client-name">${escapeHtml(c.cliente_nome)}</div>
            <div class="client-pet">${c.pet_nome ? escapeHtml(c.pet_nome) : 'Pet não informado'} • ${c.telefone || 'sem telefone'}</div>
          </div>
          <div class="client-badge ${badgeClass}">${badgeText}</div>
        </div>
        
        <div class="progress-wrap">
          <div class="progress-bar"><div class="progress-fill ${fillCor}" style="width:${percent}%"></div></div>
          <div class="progress-text">${usosRealizados} de ${totalBanhos} banhos usados</div>
        </div>
        
        <div class="client-dates">
          <span>📅 Início: ${formatarData(c.data_inicio || c.data_pagamento)}</span>
          <span>⏰ ${statusText}</span>
        </div>
        
        <div class="client-buttons">
          ${!vencido ? `<button class="btn-checkin" onclick="registrarPresenca(${c.id})">✅ VEIO HOJE</button>` : `<button class="btn-renew" onclick="renovarPacote(${c.id})">💰 RENOVAR</button>`}
          <button class="btn-history" onclick="verHistorico(${c.id})">📜 HISTÓRICO</button>
        </div>
      </div>
    `;
  }).join('');
}

// ============================================
// SALVAR NOVO PACOTE
// ============================================
async function salvarPacote() {
  const nome = document.getElementById('newNome').value.trim();
  const pagamento = document.getElementById('newDataPagamento').value;
  const frequencia = document.getElementById('newFrequencia').value;
  
  if (!nome) { toast('Nome é obrigatório', 'err'); return; }
  if (!pagamento) { toast('Data de pagamento é obrigatória', 'err'); return; }
  
  let diaSemana = null;
  let diaMes = null;
  
  if (frequencia === 'semanal') {
    diaSemana = selectedDiaSemana;
  } else if (frequencia === 'mensal') {
    diaMes = parseInt(document.getElementById('newDiaMes').value) || 15;
  }
  
  const totalBanhos = frequencia === 'semanal' ? 4 : (frequencia === 'quinzenal' ? 2 : 4);
  
  try {
    const { error } = await supabaseClient
      .from('app_pacotes_clientes')
      .insert({
        cliente_nome: nome,
        pet_nome: document.getElementById('newPet').value || null,
        telefone: document.getElementById('newTelefone').value || null,
        tipo_frequencia: frequencia,
        dia_semana: diaSemana,
        dia_mes: diaMes,
        total_banhos: totalBanhos,
        usos_realizados: 0,
        data_pagamento: pagamento,
        data_inicio: pagamento,
        valor_pago: parseFloat(document.getElementById('newValor').value) || 0,
        observacao: document.getElementById('newObs').value || null,
        status: 'ativo'
      });
    
    if (error) throw error;
    
    toast(`✅ ${nome} cadastrado!`, 'ok');
    closeNewModal();
    carregarDados();
  } catch (e) {
    console.error(e);
    toast('Erro: ' + e.message, 'err');
  }
}

// ============================================
// ATUALIZAR ESTATÍSTICAS
// ============================================
function atualizarStats() {
  const ativos = clientes.filter(c => (c.usos_realizados || 0) < (c.total_banhos || 4)).length;
  const vencidos = clientes.filter(c => (c.usos_realizados || 0) >= (c.total_banhos || 4)).length;
  const ultimo = clientes.filter(c => ((c.total_banhos || 4) - (c.usos_realizados || 0)) === 1 && (c.usos_realizados || 0) < (c.total_banhos || 4)).length;
  
  const hoje = new Date();
  const usosMes = historico.filter(h => {
    const data = new Date(h.data_evento);
    return h.tipo_evento === 'presenca' && data.getMonth() === hoje.getMonth() && data.getFullYear() === hoje.getFullYear();
  }).length;
  
  document.getElementById('statAtivos').textContent = ativos;
  document.getElementById('statUsos').textContent = usosMes;
  document.getElementById('statUltimo').textContent = ultimo;
  document.getElementById('statVencidos').textContent = vencidos;
}

// ============================================
// ALERTAS
// ============================================
function atualizarAlertas() {
  const ultimo = clientes.filter(c => ((c.total_banhos || 4) - (c.usos_realizados || 0)) === 1 && (c.usos_realizados || 0) < (c.total_banhos || 4));
  
  const temAlertas = ultimo.length > 0;
  document.getElementById('alertBanner').style.display = temAlertas ? 'block' : 'none';
  
  if (temAlertas) {
    let html = '';
    ultimo.slice(0, 3).forEach(c => {
      html += `<div class="alert-item"><div class="alert-name">🐕 ${c.pet_nome || c.cliente_nome}</div><div class="alert-desc">Último banho! Renove esta semana</div></div>`;
    });
    document.getElementById('alertList').innerHTML = html;
  }
}

function openAlertsModal() {
  const ultimo = clientes.filter(c => ((c.total_banhos || 4) - (c.usos_realizados || 0)) === 1 && (c.usos_realizados || 0) < (c.total_banhos || 4));
  const vencidos = clientes.filter(c => (c.usos_realizados || 0) >= (c.total_banhos || 4));
  
  let html = '';
  
  if (ultimo.length) {
    html += `<div style="margin-bottom:20px"><div style="font-size:11px;color:var(--gold);margin-bottom:12px;font-weight:700">🟡 ÚLTIMO BANHO — ${ultimo.length}</div>`;
    ultimo.forEach(c => {
      html += `<div class="alert-item" style="justify-content:space-between"><div><div class="alert-name">${escapeHtml(c.pet_nome || c.cliente_nome)}</div><div class="alert-desc">${escapeHtml(c.cliente_nome)}</div></div></div>`;
    });
    html += `</div>`;
  }
  
  if (vencidos.length) {
    html += `<div><div style="font-size:11px;color:var(--rose);margin-bottom:12px;font-weight:700">🔴 VENCIDOS — ${vencidos.length}</div>`;
    vencidos.forEach(c => {
      html += `<div class="alert-item" style="justify-content:space-between"><div><div class="alert-name">${escapeHtml(c.pet_nome || c.cliente_nome)}</div><div class="alert-desc">${escapeHtml(c.cliente_nome)}</div></div></div>`;
    });
    html += `</div>`;
  }
  
  if (!ultimo.length && !vencidos.length) {
    html = '<div class="empty"><div class="empty-icon">✅</div><p>Nenhum alerta no momento</p></div>';
  }
  
  document.getElementById('alertsBody').innerHTML = html;
  document.getElementById('alertsModal').classList.add('show');
}

// ============================================
// EXPORTAR
// ============================================
function exportarRelatorio() {
  if (!clientes.length) { toast('Nenhum cliente', 'err'); return; }
  
  const wsData = [['Cliente', 'Pet', 'Telefone', 'Tipo', 'Usos', 'Total', 'Status', 'Pagamento', 'Valor']];
  clientes.forEach(c => {
    wsData.push([
      c.cliente_nome, c.pet_nome || '', c.telefone || '', c.tipo_frequencia,
      c.usos_realizados || 0, c.total_banhos || 4,
      (c.usos_realizados || 0) >= (c.total_banhos || 4) ? 'VENCIDO' : 'ATIVO',
      c.data_pagamento, c.valor_pago || 0
    ]);
  });
  
  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet(wsData);
  XLSX.utils.book_append_sheet(wb, ws, 'pacotes');
  XLSX.writeFile(wb, `pacotes_${new Date().toISOString().slice(0,10)}.xlsx`);
  toast('Relatório exportado!', 'ok');
}

function exportarHistorico() {
  if (!currentHistoryId) return;
  const cliente = clientes.find(c => c.id === currentHistoryId);
  if (!cliente) return;
  
  const hist = historico.filter(h => h.cliente_id === currentHistoryId && h.tipo_evento === 'presenca');
  if (!hist.length) { toast('Sem histórico', 'err'); return; }
  
  const wsData = [['Data', 'Usos Restantes']];
  hist.forEach(h => { wsData.push([h.data_evento, h.usos_restantes]); });
  
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(wsData), 'historico');
  XLSX.writeFile(wb, `historico_${cliente.pet_nome || cliente.cliente_nome}_${new Date().toISOString().slice(0,10)}.xlsx`);
  toast('Histórico exportado!', 'ok');
}

function syncNow() { carregarDados(); toast('🔄 Sincronizando...', 'ok'); }
function atualizarBadge() {
  const vencidos = clientes.filter(c => (c.usos_realizados || 0) >= (c.total_banhos || 4)).length;
  const el = document.getElementById('bkpBadge');
  if (vencidos > 0) { el.className = 'bkp warn'; el.textContent = `⚠️ ${vencidos}`; }
  else { el.className = 'bkp ok'; el.textContent = '💾 ok'; }
}

// ============================================
// MODAIS
// ============================================
function openNewModal() {
  document.getElementById('newModal').classList.add('show');
  document.getElementById('newDataPagamento').value = new Date().toISOString().slice(0, 10);
  document.getElementById('newNome').focus();
}
function closeNewModal() {
  document.getElementById('newModal').classList.remove('show');
  document.getElementById('newNome').value = '';
  document.getElementById('newPet').value = '';
  document.getElementById('newTelefone').value = '';
  document.getElementById('newValor').value = '';
  document.getElementById('newObs').value = '';
}
function closeHistoryModal() { document.getElementById('historyModal').classList.remove('show'); currentHistoryId = null; }
function closeAlertsModal() { document.getElementById('alertsModal').classList.remove('show'); }

// ============================================
// EVENTOS
// ============================================
document.getElementById('searchInput').addEventListener('input', renderClientes);
document.getElementById('btnNewPacote').addEventListener('click', openNewModal);
document.getElementById('btnRelatorio').addEventListener('click', exportarRelatorio);
document.getElementById('btnAlertas').addEventListener('click', openAlertsModal);
document.getElementById('btnSalvarPacote').addEventListener('click', salvarPacote);
document.getElementById('btnCancelarPacote').addEventListener('click', closeNewModal);
document.getElementById('closeNewModalBtn').addEventListener('click', closeNewModal);
document.getElementById('closeHistoryModalBtn').addEventListener('click', closeHistoryModal);
document.getElementById('btnFecharHistorico').addEventListener('click', closeHistoryModal);
document.getElementById('btnExportarHistorico').addEventListener('click', exportarHistorico);
document.getElementById('closeAlertsModalBtn').addEventListener('click', closeAlertsModal);
document.getElementById('btnFecharAlertasModal').addEventListener('click', closeAlertsModal);

// Frequência change
document.getElementById('newFrequencia').addEventListener('change', (e) => {
  const val = e.target.value;
  document.getElementById('diaSemanaGroup').style.display = val === 'semanal' ? 'block' : 'none';
  document.getElementById('diaMesGroup').style.display = val === 'mensal' ? 'block' : 'none';
});

// Dias da semana
document.querySelectorAll('#diasSemana .dia-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#diasSemana .dia-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedDiaSemana = btn.dataset.dia;
  });
});

// ============================================
// INICIAR
// ============================================
carregarDados();
</script>
</body>
</html>
