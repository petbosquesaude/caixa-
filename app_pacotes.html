<head>

<style>
:root{
  --bg:#07080D;
  --s1:#0E1018;
  --s2:#141620;
  --border:#222840;
  --border2:#2D3450;
  --gold:#F9C224;
  --goldd:#C4901A;
  --goldf:rgba(249,194,36,.13);
  --teal:#00E5B0;
  --tealf:rgba(0,229,176,.1);
  --rose:#FF2D55;
  --rosef:rgba(255,45,85,.12);
  --blue:#4DA6FF;
  --bluef:rgba(77,166,255,.1);
  --purple:#C48FFF;
  --purplef:rgba(196,143,255,.1);
  --green:#1DB954;
  --greenf:rgba(29,185,84,.1);
  --orange:#FF7A20;
  --orangef:rgba(255,122,32,.1);
  --text:#EEF2FF;
  --muted:#5A6A8A;
  --muted2:#2E3A52;
  --title:'Bebas Neue',cursive;
  --body:'DM Sans',sans-serif;
  --mono:'DM Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:var(--body);color:var(--text);background:var(--bg);min-height:100vh;overflow-x:hidden}
.app{max-width:430px;margin:0 auto;min-height:100vh;padding-bottom:100px;position:relative;z-index:1}

/* Header */
.hdr{padding:24px 20px 0;display:flex;align-items:center;justify-content:space-between}
.hdr-brand{display:flex;align-items:center;gap:12px}
.hdr-paw{width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,var(--gold),var(--goldd));display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:0 0 28px rgba(249,194,36,.35)}
.hdr-title{font-family:var(--title);font-size:28px;background:linear-gradient(135deg,#fff 30%,var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr-sub{font-size:10px;color:var(--muted);margin-top:2px}
.bkp{padding:7px 12px;border-radius:20px;font-size:10px;font-family:var(--mono);font-weight:600;border:1.5px solid;cursor:pointer}
.bkp.ok{background:var(--greenf);border-color:rgba(29,185,84,.35);color:var(--green)}
.bkp.warn{background:rgba(249,194,36,.1);border-color:rgba(249,194,36,.4);color:var(--gold);animation:blink 2s infinite}
.bkp.bad{background:var(--rosef);border-color:rgba(255,45,85,.4);color:var(--rose)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.55}}

/* Alert Banner */
.alert-banner{background:linear-gradient(135deg,rgba(249,194,36,.12),rgba(249,194,36,.03));border:1px solid rgba(249,194,36,.4);border-radius:14px;margin:16px 16px 0;padding:12px 14px}
.alert-title{font-size:9px;text-transform:uppercase;letter-spacing:2px;color:var(--gold);font-weight:700;margin-bottom:8px}
.alert-item{display:flex;align-items:center;justify-content:space-between;padding:8px 0}
.alert-item:last-child{padding-bottom:0}
.alert-name{font-size:13px;font-weight:700;color:var(--gold)}
.alert-desc{font-size:9px;color:var(--muted);margin-top:2px}
.alert-btn{padding:6px 12px;border-radius:8px;border:none;background:rgba(249,194,36,.2);color:var(--gold);font-size:10px;font-weight:600;cursor:pointer}

/* Stats Row */
.stats-row{display:flex;gap:8px;margin:16px 16px 0}
.stat-card{flex:1;background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:12px;text-align:center}
.stat-val{font-size:20px;font-weight:700;font-family:var(--mono)}
.stat-label{font-size:8px;text-transform:uppercase;color:var(--muted);margin-top:4px;letter-spacing:.5px}
.stat-card.green .stat-val{color:var(--green)}
.stat-card.rose .stat-val{color:var(--rose)}
.stat-card.gold .stat-val{color:var(--gold)}
.stat-card.blue .stat-val{color:var(--blue)}

/* Search */
.search-wrap{margin:16px 16px 8px}
.search-input{width:100%;background:var(--s1);border:1.5px solid var(--border);border-radius:14px;padding:14px 16px;color:var(--text);font-family:var(--body);font-size:14px;outline:none}
.search-input:focus{border-color:var(--gold)}

/* Client List */
.sec{margin:16px 16px 8px;font-size:9px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);display:flex;align-items:center;gap:8px}
.sec::after{content:'';flex:1;height:1px;background:var(--border2)}

.client-card{background:var(--s1);border:1.5px solid var(--border);border-radius:14px;margin:8px 16px;padding:16px;transition:all .15s}
.client-card:active{transform:scale(.98)}
.client-card.urgent{border-color:var(--rose);background:rgba(255,45,85,.05)}
.client-card.warning{border-color:var(--gold);background:rgba(249,194,36,.05)}
.client-header{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.client-avatar{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,var(--purple),var(--blue));display:flex;align-items:center;justify-content:center;font-size:22px}
.client-info{flex:1}
.client-name{font-size:15px;font-weight:700}
.client-pet{font-size:11px;color:var(--muted);margin-top:2px}
.client-badge{padding:4px 8px;border-radius:8px;font-size:9px;font-weight:700;background:rgba(90,106,138,.15)}
.client-badge.semanal{background:rgba(77,166,255,.15);color:var(--blue)}
.client-badge.quinzenal{background:rgba(0,229,176,.15);color:var(--teal)}
.client-badge.mensal{background:rgba(249,194,36,.15);color:var(--gold)}
.progress-wrap{margin:10px 0}
.progress-bar{height:6px;background:var(--muted2);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width .3s}
.progress-fill.green{background:var(--green)}
.progress-fill.gold{background:var(--gold)}
.progress-fill.rose{background:var(--rose)}
.progress-text{font-size:10px;color:var(--muted);margin-top:4px}
.client-dates{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin:8px 0}
.client-buttons{display:flex;gap:8px;margin-top:12px}
.btn-checkin{flex:2;padding:12px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--green),#138A40);color:#000;font-weight:700;font-size:13px;cursor:pointer}
.btn-history{flex:1;padding:12px;border-radius:10px;border:1.5px solid var(--border2);background:transparent;color:var(--text);font-size:13px;cursor:pointer}
.btn-renew{flex:1;padding:12px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--gold),var(--goldd));color:#000;font-weight:700;font-size:13px;cursor:pointer}
.btn-checkin:active,.btn-history:active,.btn-renew:active{transform:scale(.96)}
.btn-checkin.disabled{opacity:0.5;cursor:not-allowed}

/* Penúltimo banho animation */
@keyframes pulsePenultimo {
  0% { background-color: rgba(249,194,36,0); border-left-color: var(--gold); }
  50% { background-color: rgba(249,194,36,0.15); border-left-color: var(--gold); }
  100% { background-color: rgba(249,194,36,0); border-left-color: var(--gold); }
}
.history-item.penultimo {
  animation: pulsePenultimo 1s ease-in-out 3;
  border-left: 3px solid var(--gold);
  background: linear-gradient(90deg, rgba(249,194,36,0.05), transparent);
}

/* Empty state */
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-icon{font-size:48px;opacity:.3;margin-bottom:12px}

/* Bottom Bar */
.bottom-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;display:flex;gap:8px;padding:12px 16px 28px;background:linear-gradient(to top,var(--bg) 70%,transparent);z-index:50}
.bottom-btn{flex:1;padding:14px;border-radius:12px;border:none;font-weight:700;font-size:12px;cursor:pointer;transition:all .15s}
.bottom-btn:active{transform:scale(.96)}
.btn-new{background:linear-gradient(135deg,var(--purple),#7B4ECC);color:#fff}
.btn-report{background:rgba(0,229,176,.1);border:1.5px solid rgba(0,229,176,.3);color:var(--teal)}
.btn-alerts{background:rgba(249,194,36,.1);border:1.5px solid rgba(249,194,36,.3);color:var(--gold);position:relative}

/* Modal */
.modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.modal.show{display:flex}
.modal-content{background:var(--s1);border:1px solid var(--border);border-radius:20px;width:100%;max-width:380px;max-height:85vh;overflow-y:auto}
.modal-header{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.modal-title{font-size:16px;font-weight:700}
.modal-close{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer}
.modal-body{padding:20px}
.modal-footer{padding:16px 20px;border-top:1px solid var(--border);display:flex;gap:10px}

/* Form */
.form-group{margin-bottom:16px}
.form-label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-weight:700;margin-bottom:6px;display:block}
.form-input,.form-select{width:100%;background:var(--bg);border:1.5px solid var(--border2);border-radius:10px;padding:12px 14px;color:var(--text);font-family:var(--body);font-size:14px;outline:none}
.form-input:focus,.form-select:focus{border-color:var(--gold)}
.form-row{display:flex;gap:10px}
.form-row .form-group{flex:1}

/* Dias da semana */
.dias-wrap{display:flex;gap:8px;flex-wrap:wrap}
.dia-btn{padding:10px 14px;border-radius:10px;border:1.5px solid var(--border2);background:var(--s1);color:var(--muted);cursor:pointer;font-size:12px;font-weight:600}
.dia-btn.selected{border-color:var(--gold);background:rgba(249,194,36,.15);color:var(--gold)}

/* History items (base) */
.history-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border2)}
.history-date{font-family:var(--mono);font-size:12px}
.history-rest{font-size:11px;color:var(--muted)}
.history-badge{padding:2px 8px;border-radius:6px;font-size:9px;background:rgba(0,229,176,.1);color:var(--teal)}

/* Toast */
.toast{position:fixed;top:22px;left:50%;z-index:999;transform:translateX(-50%) translateY(-90px);padding:11px 20px;border-radius:24px;font-size:13px;font-weight:700;border:1px solid;transition:transform .3s;backdrop-filter:blur(12px);white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.ok{background:rgba(29,185,84,.15);border-color:rgba(29,185,84,.4);color:var(--green)}
.toast.err{background:rgba(255,45,85,.15);border-color:rgba(255,45,85,.4);color:var(--rose)}
.toast.warn{background:rgba(249,194,36,.12);border-color:rgba(249,194,36,.4);color:var(--gold)}
</style>
</head>

<div class="app">

<div class="hdr">

<!-- Stats -->

<!-- Search -->

  <input type="text" class="search-input" id="searchInput" placeholder="🔎 Buscar cliente ou pet..." autocomplete="off">

<!-- Bottom Bar -->

<!-- Modal Histórico -->

<script>
// Supabase config
const SUPA_URL = "https://wyibsreqdvnllzuzjvgr.supabase.co";
const SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind5aWJzcmVxZHZubGx6dXpqdmdyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1NTc5MzEsImV4cCI6MjA5MjEzMzkzMX0.AbK_8f8NKvwHbDgvDJthibFKrUW8fFJmR2YGnjq7ovs";
const supabaseClient = supabase.createClient(SUPA_URL, SUPA_KEY);

let clientes = [];
let historico = [];
let currentHistoryId = null;
let selectedDiaSemana = 'sexta';

// ============================================
// UTILITÁRIOS
// ============================================
function toast(msg, type = 'ok') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast ' + type + ' show';
  setTimeout(() => el.classList.remove('show'), 2500);
}

function formatarData(data) {
  if (!data) return '—';
  const d = new Date(data);
  return `${d.getDate().toString().padStart(2, '0')}/${(d.getMonth() + 1).toString().padStart(2, '0')}/${d.getFullYear()}`;
}

// ============================================
// CARREGAR DADOS DO SUPABASE
// ============================================
async function carregarDados() {
  try {
    const { data: clientesData, error: clientesError } = await supabaseClient
      .from('app_pacotes_clientes')
      .select('*')
      .order('cliente_nome');
    
    if (clientesError) throw clientesError;
    clientes = clientesData || [];

    const { data: historicoData, error: historicoError } = await supabaseClient
      .from('app_pacotes_historico')
      .select('*')
      .order('data_uso', { ascending: false });
    
    if (!historicoError) historico = historicoData || [];

    renderClientes();
    atualizarStats();
    atualizarAlertas();
    atualizarBadge();
    
    if (clientes.length) {
      toast(`✅ ${clientes.length} clientes carregados`, 'ok');
    }
  } catch (e) {
    console.error('Erro ao carregar:', e);
    toast('Erro ao carregar dados do servidor', 'err');
    document.getElementById('clientList').innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><p>Erro de conexão com o servidor<br>Verifique sua internet</p></div>`;
  }
}

// ============================================
// CALCULAR STATUS DO PACOTE
// ============================================
function calcularStatus(cliente) {
  const usosRestantes = cliente.total_banhos - cliente.usos_realizados;
  let status = 'ok';
  let statusText = '';
  let cor = 'green';
  
  if (usosRestantes <= 0) {
    status = 'vencido';
    statusText = '🔴 PACOTE VENCIDO';
    cor = 'rose';
  } else if (usosRestantes === 1) {
    status = 'urgent';
    statusText = '🟡 ÚLTIMO BANHO! Renove esta semana';
    cor = 'gold';
  } else {
    statusText = `🟢 ${usosRestantes} banhos restantes`;
    cor = 'green';
  }
  
  return { status, statusText, cor, usosRestantes };
}

// ============================================
// ORDENAÇÃO: últimos banhos primeiro
// ============================================
function ordenarClientes(lista) {
  return [...lista].sort((a, b) => {
    const restantesA = a.total_banhos - a.usos_realizados;
    const restantesB = b.total_banhos - b.usos_realizados;
    
    // Vencidos vão para o fim
    if (restantesA <= 0 && restantesB > 0) return 1;
    if (restantesB <= 0 && restantesA > 0) return -1;
    
    // Último banho (restantes === 1) no topo
    if (restantesA === 1 && restantesB !== 1) return -1;
    if (restantesB === 1 && restantesA !== 1) return 1;
    
    // Depois, por número de restantes (menos primeiro)
    if (restantesA !== restantesB) return restantesA - restantesB;
    
    // Por nome
    return a.cliente_nome.localeCompare(b.cliente_nome);
  });
}

// ============================================
// RENDERIZAR LISTA DE CLIENTES (com botão alterar data)
// ============================================
function renderClientes() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  let filtrados = clientes.filter(c => 
    c.cliente_nome.toLowerCase().includes(search) || 
    (c.pet_nome && c.pet_nome.toLowerCase().includes(search))
  );
  
  filtrados = ordenarClientes(filtrados);
  
  const container = document.getElementById('clientList');
  if (!filtrados.length) {
    container.innerHTML = `<div class="empty"><div class="empty-icon">🐕</div><p>Nenhum cliente encontrado</p></div>`;
    return;
  }
  
  container.innerHTML = filtrados.map(c => {
    const usosRestantes = c.total_banhos - c.usos_realizados;
    const vencido = usosRestantes <= 0;
    const isUltimo = usosRestantes === 1;
    const mostrarProgresso = (usosRestantes <= 2 && !vencido); // mostra barra se restam 2 ou menos
    
    const badgeClass = c.tipo_frequencia;
    const badgeText = c.tipo_frequencia === 'semanal' ? '📅 Semanal' : (c.tipo_frequencia === 'quinzenal' ? '📅 Quinzenal' : '📅 Mensal');
    
    let statusText = '';
    let fillCor = 'green';
    if (vencido) {
      statusText = '🔴 AGUARDANDO RENOVAÇÃO';
      fillCor = 'rose';
    } else if (isUltimo) {
      statusText = '🟡 ÚLTIMO BANHO! Renove esta semana';
      fillCor = 'gold';
    } else {
      statusText = `🟢 ${usosRestantes} banhos restantes`;
      fillCor = 'green';
    }
    
    const cardClass = vencido ? 'urgent' : (isUltimo ? 'warning' : '');
    
    let html = `
      <div class="client-card ${cardClass}">
        <div class="client-header">
          <div class="client-avatar">🐕</div>
          <div class="client-info">
            <div class="client-name">${escapeHtml(c.cliente_nome)}</div>
            <div class="client-pet">${c.pet_nome ? escapeHtml(c.pet_nome) : 'Pet não informado'} • ${c.telefone || 'sem telefone'}</div>
          </div>
          <div class="client-badge ${badgeClass}">${badgeText}</div>
        </div>
        
        <div class="client-dates">
          <span>📅 Pagamento: ${formatarData(c.data_pagamento) || '—'}</span>
          <span>📅 Último uso: ${formatarData(c.ultimo_uso) || '—'}</span>
        </div>
    `;
    
    if (vencido) {
      html += `
        <div class="client-buttons" style="margin-top:12px">
          <button class="btn-renew" onclick="renovarPacote(${c.id})">💰 RENOVAR</button>
          <button class="btn-history" onclick="verHistorico(${c.id})">📜 HISTÓRICO</button>
        </div>
      `;
    } else {
      if (mostrarProgresso) {
        const percent = (c.usos_realizados / c.total_banhos) * 100;
        html += `
          <div class="progress-wrap">
            <div class="progress-bar"><div class="progress-fill ${fillCor}" style="width:${percent}%"></div></div>
            <div class="progress-text">${c.usos_realizados} de ${c.total_banhos} banhos usados</div>
          </div>
          <div class="client-dates" style="margin-top:4px">
            <span>⏰ ${statusText}</span>
          </div>
        `;
      } else {
        html += `<div style="margin-top:8px; font-size:10px; color:var(--muted); text-align:right">${usosRestantes} banhos restantes</div>`;
      }
      
      html += `
        <div class="client-buttons" style="margin-top:12px">
          <div style="display:flex; gap:6px; flex:2">
            <button class="btn-checkin" style="flex:3" onclick="registrarUso(${c.id})">✅ VEIO HOJE</button>
            <button class="btn-checkin" style="flex:1; background:rgba(77,166,255,.2); color:var(--blue)" onclick="abrirAlterarData(${c.id})">📅</button>
          </div>
          <button class="btn-history" onclick="verHistorico(${c.id})">📜 HISTÓRICO</button>
        </div>
      `;
    }
    
    html += `</div>`;
    return html;
  }).join('');
}

function escapeHtml(text) {
  if (!text) return '';
  return text.replace(/[&<>]/g, function(m) {
    if (m === '&') return '&amp;';
    if (m === '<') return '&lt;';
    if (m === '>') return '&gt;';
    return m;
  });
}

// ============================================
// ALTERAR DATA (botão 📅)
// ============================================
function abrirAlterarData(id) {
  const dataStr = prompt("Digite a data do banho (formato AAAA-MM-DD):", new Date().toISOString().slice(0,10));
  if (dataStr && /^\d{4}-\d{2}-\d{2}$/.test(dataStr)) {
    registrarUso(id, dataStr);
  } else if (dataStr) {
    toast("Data inválida. Use AAAA-MM-DD", "err");
  }
}

// ============================================
// REGISTRAR USO (CHECK-IN) com data opcional
// ============================================
async function registrarUso(id, dataEscolhida = null) {
  const cliente = clientes.find(c => c.id === id);
  if (!cliente) return;
  
  const hoje = dataEscolhida || new Date().toISOString().slice(0, 10);
  
  // Verifica se já registrou presença nesta data
  const jaRegistrouHoje = historico.some(h => h.cliente_id === id && h.data_uso === hoje);
  if (jaRegistrouHoje) {
    toast(`⚠️ ${cliente.pet_nome || cliente.cliente_nome} já registrou presença em ${formatarData(hoje)}!`, 'warn');
    return;
  }
  
  const novosUsos = cliente.usos_realizados + 1;
  if (novosUsos > cliente.total_banhos) {
    toast(`❌ ${cliente.pet_nome || cliente.cliente_nome} já usou todos os banhos. Renove o pacote.`, 'err');
    return;
  }
  
  const vencido = novosUsos >= cliente.total_banhos;
  
  try {
    const { error: updateError } = await supabaseClient
      .from('app_pacotes_clientes')
      .update({
        usos_realizados: novosUsos,
        ultimo_uso: hoje,
        status: vencido ? 'vencido' : 'ativo',
        updated_at: new Date().toISOString()
      })
      .eq('id', id);
    
    if (updateError) throw updateError;
    
    const { error: histError } = await supabaseClient
      .from('app_pacotes_historico')
      .insert({
        cliente_id: id,
        cliente_nome: cliente.cliente_nome,
        pet_nome: cliente.pet_nome,
        data_uso: hoje,
        tipo_pacote: cliente.tipo_frequencia,
        usos_restantes: cliente.total_banhos - novosUsos
      });
    
    if (histError) console.warn('Erro ao salvar histórico:', histError);
    
    toast(`✅ ${cliente.pet_nome || cliente.cliente_nome} - banho registrado em ${formatarData(hoje)}!`, 'ok');
    carregarDados();
  } catch (e) {
    console.error(e);
    toast('Erro ao registrar uso', 'err');
  }
}

// ============================================
// RENOVAR PACOTE
// ============================================
async function renovarPacote(id) {
  const cliente = clientes.find(c => c.id === id);
  if (!cliente) return;
  
  const hoje = new Date().toISOString().slice(0, 10);
  const totalBanhos = cliente.tipo_frequencia === 'semanal' ? 4 : (cliente.tipo_frequencia === 'quinzenal' ? 2 : 4);
  
  try {
    await supabaseClient
      .from('app_pacotes_clientes')
      .update({
        usos_realizados: 0,
        status: 'ativo',
        data_pagamento: hoje,
        updated_at: new Date().toISOString()
      })
      .eq('id', id);
    
    await supabaseClient
      .from('app_pacotes_historico')
      .insert({
        cliente_id: id,
        cliente_nome: cliente.cliente_nome,
        pet_nome: cliente.pet_nome,
        data_uso: hoje,
        tipo_pacote: cliente.tipo_frequencia,
        usos_restantes: totalBanhos,
        observacao: 'Renovação de pacote'
      });
    
    toast(`💰 ${cliente.pet_nome || cliente.cliente_nome} - pacote renovado!`, 'ok');
    carregarDados();
  } catch (e) {
    console.error(e);
    toast('Erro ao renovar', 'err');
  }
}

// ============================================
// VER HISTÓRICO (agrupado por ciclos)
// ============================================
async function verHistorico(id) {
  currentHistoryId = id;
  const cliente = clientes.find(c => c.id === id);
  // Obter todos registros do cliente, ordenados por data crescente
  let todos = historico.filter(h => h.cliente_id === id).sort((a,b) => new Date(a.data_uso) - new Date(b.data_uso));
  
  // Separar em ciclos usando registros com "Renovação" como marcadores
  const ciclos = [];
  let cicloAtual = [];
  for (let i = 0; i < todos.length; i++) {
    const reg = todos[i];
    if (reg.observacao && reg.observacao.includes("Renovação")) {
      if (cicloAtual.length > 0) {
        ciclos.push(cicloAtual);
        cicloAtual = [];
      }
      continue; // não adiciona o marcador como uso
    }
    cicloAtual.push(reg);
  }
  if (cicloAtual.length > 0) ciclos.push(cicloAtual);
  
  // Ciclos mais recentes primeiro
  ciclos.reverse();
  
  if (ciclos.length === 0) {
    document.getElementById('historyBody').innerHTML = '<div class="empty"><div class="empty-icon">📭</div><p>Nenhum registro ainda</p></div>';
  } else {
    let html = `
      <div style="margin-bottom:16px;padding:12px;background:rgba(90,106,138,.08);border-radius:12px">
        <div><strong>${escapeHtml(cliente.cliente_nome)}</strong> · ${cliente.pet_nome ? escapeHtml(cliente.pet_nome) : ''}</div>
        <div style="font-size:12px;color:var(--muted);margin-top:4px">📞 ${cliente.telefone || '—'} | 📦 ${cliente.tipo_frequencia}</div>
      </div>
    `;
    
    ciclos.forEach((ciclo, idx) => {
      const primeiro = ciclo[0];
      const ultimo = ciclo[ciclo.length-1];
      const dataInicio = formatarData(primeiro.data_uso);
      const dataFim = formatarData(ultimo.data_uso);
      const totalUsos = ciclo.length;
      const isOpen = idx === 0 ? 'open' : ''; // abre apenas o mais recente
      html += `
        <details ${isOpen} style="margin-bottom: 16px; background: var(--s1); border-radius: 12px; padding: 8px;">
          <summary style="font-size: 12px; font-weight: 700; color: var(--gold); padding: 8px; cursor: pointer; list-style: none;">
            📦 Pacote ${ciclos.length - idx} · ${dataInicio} a ${dataFim} (${totalUsos} usos)
          </summary>
          <div style="margin-top: 8px;">
            ${ciclo.map(h => `
              <div class="history-item ${h.usos_restantes === 1 ? 'penultimo' : ''}">
                <span class="history-date">✅ ${formatarData(h.data_uso)}</span>
                <span class="history-rest">restantes: ${h.usos_restantes}</span>
                <span class="history-badge">${h.tipo_pacote}</span>
              </div>
            `).join('')}
          </div>
        </details>
      `;
    });
    document.getElementById('historyBody').innerHTML = html;
  }
  
  document.getElementById('historyModal').classList.add('show');
}

// ============================================
// SALVAR NOVO PACOTE
// ============================================
async function salvarPacote() {
  const nome = document.getElementById('newNome').value.trim();
  const pet = document.getElementById('newPet').value.trim();
  const telefone = document.getElementById('newTelefone').value.trim();
  const dataPagamento = document.getElementById('newDataPagamento').value;
  const valor = parseFloat(document.getElementById('newValor').value) || 0;
  const frequencia = document.getElementById('newFrequencia').value;
  const obs = document.getElementById('newObs').value;
  
  if (!nome) { toast('Nome do tutor é obrigatório', 'err'); return; }
  if (!dataPagamento) { toast('Data de pagamento é obrigatória', 'err'); return; }
  
  let diaSemana = null;
  let diaMes = null;
  
  if (frequencia === 'semanal') {
    diaSemana = selectedDiaSemana;
  } else if (frequencia === 'mensal') {
    diaMes = parseInt(document.getElementById('newDiaMes').value) || 15;
  }
  
  const totalBanhos = frequencia === 'semanal' ? 4 : (frequencia === 'quinzenal' ? 2 : 4);
  const dataInicio = dataPagamento;
  
  try {
    const { error } = await supabaseClient
      .from('app_pacotes_clientes')
      .insert({
        cliente_nome: nome,
        pet_nome: pet || null,
        telefone: telefone || null,
        tipo_frequencia: frequencia,
        dia_semana: diaSemana,
        dia_mes: diaMes,
        total_banhos: totalBanhos,
        usos_realizados: 0,
        data_pagamento: dataPagamento,
        data_inicio: dataInicio,
        valor_mensal: valor,
        observacao: obs || null,
        status: 'ativo'
      });
    
    if (error) throw error;
    
    toast(`✅ ${pet || nome} cadastrado com sucesso!`, 'ok');
    closeNewModal();
    carregarDados();
  } catch (e) {
    console.error(e);
    toast('Erro ao salvar: ' + e.message, 'err');
  }
}

// ============================================
// ATUALIZAR ESTATÍSTICAS
// ============================================
function atualizarStats() {
  const ativos = clientes.filter(c => c.status === 'ativo' && c.usos_realizados < c.total_banhos).length;
  const vencidos = clientes.filter(c => c.usos_realizados >= c.total_banhos).length;
  const renovar = clientes.filter(c => (c.total_banhos - c.usos_realizados) === 1 && c.status !== 'vencido').length;
  
  const hoje = new Date();
  const usosMes = historico.filter(h => {
    const data = new Date(h.data_uso);
    return data.getMonth() === hoje.getMonth() && data.getFullYear() === hoje.getFullYear();
  }).length;
  
  document.getElementById('statAtivos').textContent = ativos;
  document.getElementById('statUsos').textContent = usosMes;
  document.getElementById('statRenovar').textContent = renovar;
  document.getElementById('statVencidos').textContent = vencidos;
}

// ============================================
// ALERTAS (sem botão ligar)
// ============================================
function atualizarAlertas() {
  const urgentes = clientes.filter(c => (c.total_banhos - c.usos_realizados) === 1 && c.status !== 'vencido');
  const vencidos = clientes.filter(c => c.usos_realizados >= c.total_banhos);
  
  const temAlertas = urgentes.length > 0 || vencidos.length > 0;
  document.getElementById('alertBanner').style.display = temAlertas ? 'block' : 'none';
  
  if (temAlertas) {
    let html = '';
    urgentes.slice(0, 3).forEach(c => {
      html += `<div class="alert-item"><div class="alert-icon">🟡</div><div class="alert-info"><div class="alert-name">${escapeHtml(c.pet_nome || c.cliente_nome)}</div><div class="alert-desc">Último banho! Renove esta semana</div></div></div>`;
    });
    if (vencidos.length && urgentes.length < 3) {
      vencidos.slice(0, 3 - urgentes.length).forEach(c => {
        html += `<div class="alert-item"><div class="alert-icon">🔴</div><div class="alert-info"><div class="alert-name">${escapeHtml(c.pet_nome || c.cliente_nome)}</div><div class="alert-desc">Pacote vencido! Cliente precisa renovar</div></div></div>`;
      });
    }
    document.getElementById('alertList').innerHTML = html;
  }
}

function openAlertsModal() {
  const urgentes = clientes.filter(c => (c.total_banhos - c.usos_realizados) === 1 && c.status !== 'vencido');
  const vencidos = clientes.filter(c => c.usos_realizados >= c.total_banhos);
  
  let html = '';
  
  if (urgentes.length) {
    html += `<div style="margin-bottom:20px"><div style="font-size:11px;color:var(--gold);margin-bottom:12px;font-weight:700">🟡 ÚLTIMO BANHO (URGENTE) — ${urgentes.length}</div>`;
    urgentes.forEach(c => {
      html += `<div class="alert-item"><div class="alert-icon">🟡</div><div class="alert-info"><div class="alert-name">${escapeHtml(c.pet_nome || c.cliente_nome)}</div><div class="alert-desc">${escapeHtml(c.cliente_nome)} · ${c.telefone || 'sem telefone'}</div></div></div>`;
    });
    html += `</div>`;
  }
  
  if (vencidos.length) {
    html += `<div><div style="font-size:11px;color:var(--rose);margin-bottom:12px;font-weight:700">🔴 VENCIDOS — ${vencidos.length}</div>`;
    vencidos.forEach(c => {
      html += `<div class="alert-item"><div class="alert-icon">🔴</div><div class="alert-info"><div class="alert-name">${escapeHtml(c.pet_nome || c.cliente_nome)}</div><div class="alert-desc">${escapeHtml(c.cliente_nome)} · renovação pendente</div></div></div>`;
    });
    html += `</div>`;
  }
  
  if (!urgentes.length && !vencidos.length) {
    html = '<div class="empty"><div class="empty-icon">✅</div><p>Nenhum alerta no momento</p></div>';
  }
  
  document.getElementById('alertsBody').innerHTML = html;
  document.getElementById('alertsModal').classList.add('show');
}

// ============================================
// EXPORTAÇÃO
// ============================================
function exportarRelatorio() {
  if (!clientes.length) {
    toast('Nenhum cliente para exportar', 'err');
    return;
  }
  
  const wsData = [['Cliente', 'Pet', 'Telefone', 'Frequência', 'Usos', 'Total', 'Status', 'Data Pagamento', 'Início', 'Valor', 'Observação']];
  clientes.forEach(c => {
    wsData.push([
      c.cliente_nome,
      c.pet_nome || '',
      c.telefone || '',
      c.tipo_frequencia,
      c.usos_realizados,
      c.total_banhos,
      c.usos_realizados >= c.total_banhos ? 'VENCIDO' : 'ATIVO',
      c.data_pagamento || '',
      c.data_inicio,
      c.valor_mensal || 0,
      c.observacao || ''
    ]);
  });
  
  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet(wsData);
  ws['!cols'] = [{wch:20},{wch:15},{wch:15},{wch:12},{wch:8},{wch:8},{wch:10},{wch:12},{wch:12},{wch:10},{wch:25}];
  XLSX.utils.book_append_sheet(wb, ws, 'pacotes');
  XLSX.writeFile(wb, `pacotes_${new Date().toISOString().slice(0,10)}.xlsx`);
  toast('Relatório exportado!', 'ok');
}

function exportarHistorico() {
  if (!currentHistoryId) return;
  const cliente = clientes.find(c => c.id === currentHistoryId);
  if (!cliente) return;
  
  const hist = historico.filter(h => h.cliente_id === currentHistoryId);
  if (!hist.length) {
    toast('Nenhum histórico para exportar', 'err');
    return;
  }
  
  const wsData = [['Data do Banho', 'Usos Restantes', 'Tipo Pacote']];
  hist.forEach(h => {
    wsData.push([h.data_uso, h.usos_restantes, h.tipo_pacote]);
  });
  
  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet(wsData);
  XLSX.utils.book_append_sheet(wb, ws, `historico_${cliente.pet_nome || cliente.cliente_nome}`);
  XLSX.writeFile(wb, `historico_${cliente.pet_nome || cliente.cliente_nome}_${new Date().toISOString().slice(0,10)}.xlsx`);
  toast('Histórico exportado!', 'ok');
}

function syncNow() {
  carregarDados();
  toast('🔄 Sincronizando...', 'ok');
}

function atualizarBadge() {
  const vencidos = clientes.filter(c => c.usos_realizados >= c.total_banhos).length;
  const urgentes = clientes.filter(c => (c.total_banhos - c.usos_realizados) === 1).length;
  const el = document.getElementById('bkpBadge');
  if (vencidos > 0 || urgentes > 0) {
    el.className = 'bkp warn';
    el.textContent = `⚠️ ${urgentes + vencidos}`;
  } else {
    el.className = 'bkp ok';
    el.textContent = '💾 ok';
  }
}

// ============================================
// MODAIS
// ============================================
function openNewModal() {
  document.getElementById('newModal').classList.add('show');
  document.getElementById('newDataPagamento').value = new Date().toISOString().slice(0, 10);
  document.getElementById('newNome').focus();
}

function closeNewModal() {
  document.getElementById('newModal').classList.remove('show');
  document.getElementById('newNome').value = '';
  document.getElementById('newPet').value = '';
  document.getElementById('newTelefone').value = '';
  document.getElementById('newValor').value = '';
  document.getElementById('newObs').value = '';
  document.getElementById('newDiaMes').value = '';
}

function closeHistoryModal() {
  document.getElementById('historyModal').classList.remove('show');
  currentHistoryId = null;
}

function closeAlertsModal() {
  document.getElementById('alertsModal').classList.remove('show');
}

function marcarTodosLidos() {
  closeAlertsModal();
  toast('Alertas marcados como visualizados', 'ok');
}

document.querySelectorAll('#diasSemana .dia-btn').forEach(btn => {

    document.querySelectorAll('#diasSemana .dia-btn').forEach(b => b.classList.remove('selected'));

  });

document.querySelector('#diasSemana .dia-btn[data-dia="sexta"]')?.classList.add('selected');

// ============================================

// ============================================
carregarDados();
</script>
